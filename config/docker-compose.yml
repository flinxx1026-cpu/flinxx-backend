version: '3.8'

services:
  # ⚡ REDIS CACHE - Auto-restart with memory limits
  redis:
    image: redis:7-alpine
    container_name: flinxx-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - flinxx-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - CLIENT_URL=http://localhost:3000
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    command: npm run dev
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - flinxx-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_SOCKET_URL=http://localhost:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - backend
    networks:
      - flinxx-network

networks:
  flinxx-network:
    driver: bridge

volumes:
  redis_data:
    driver: local
