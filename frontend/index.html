<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png?v=2026020701" sizes="32x32">
  <link rel="apple-touch-icon" href="/favicon.png">
  <title>Flinxx - Meet New People Instantly</title>

  <meta property="og:description" content="Meet new people instantly on Flinxx. Connect with strangers through fast and secure random video chat.">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",

    "url": "https://flinxx.in",

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Flinxx",
    "url": "https://flinxx.in/"
  }

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SiteNavigationElement",
    "name": "About Flinxx",
    "url": "https://flinxx.in/about"
  }

  <!-- Preconnect to Google Fonts for faster loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Material Icons Font — use display=block to prevent FOUC -->
  <link rel="preload" href="https://fonts.googleapis.com/icon?family=Material+Icons&display=block" as="style">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons&display=block" rel="stylesheet">
  <link rel="preload" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round&display=block" as="style">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round&display=block" rel="stylesheet">
  <!-- Material Symbols Outlined Font — preload + display=block for faster loading -->
  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block"
    as="style">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block"
    rel="stylesheet">
  <!-- Playfair Display & Inter Fonts — swap is fine for text fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Preload Cashfree SDK for faster loading -->
  <link rel="preload" as="script" href="https://sdk.cashfree.com/js/v3/cashfree.js">

  <!-- Google Sign-In SDK -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- Font Loading: display=block in font URLs handles FOUC natively -->
  <script>
    // Mark fonts as loaded for any components that check
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => {
        document.body.classList.add('fonts-loaded');
      });
    } else {
      window.addEventListener('load', () => {
        document.body.classList.add('fonts-loaded');
      });
    }
  </script>

  <!-- Cashfree Web Checkout SDK v3 -->
  <script id="cashfree-sdk" src="https://sdk.cashfree.com/js/v3/cashfree.js" async defer
    onload="window.cashfreeLoaded = true; window.dispatchEvent(new Event('cashfreeSDKLoaded'));"
    onerror="window.cashfreeFailed = true; window.dispatchEvent(new Event('cashfreeSDKFailed'));">
    </script>

  <!-- Cashfree SDK Initialization & Fallback (production-silent) -->
  <script>
    // Runtime dev flag for inline scripts (Vite esbuild does NOT process index.html scripts)
    var __DEV__ = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

    var initCashfree = function() {
      if (typeof window.Cashfree !== 'undefined' && window.Cashfree) {
        if (__DEV__) console.log('[SDK] Cashfree initialized');
        window.cashfreeSDKReady = true;
        return true;
      }
      return false;
    };

    window.addEventListener('cashfreeSDKLoaded', function() {
      initCashfree();
    });

    if (!initCashfree()) {
      var attempts = 0;
      var initInterval = setInterval(function() {
        attempts++;
        if (initCashfree()) {
          clearInterval(initInterval);
        } else if (attempts > 50) {
          clearInterval(initInterval);
        }
      }, 100);
    }

    window.reloadCashfreeSDK = function() {
      var existing = document.getElementById('cashfree-sdk');
      if (existing) existing.remove();
      var script = document.createElement('script');
      script.id = 'cashfree-sdk';
      script.src = 'https://sdk.cashfree.com/js/v3/cashfree.js';
      script.async = true;
      script.defer = true;
      script.onload = function() {
        window.cashfreeLoaded = true;
        initCashfree();
      };
      script.onerror = function() {};
      document.head.appendChild(script);
    };
  </script>

  <style>
    body {
      min-height: max(884px, 100dvh);
      margin: 0;
      padding: 0;
      background: #000;
    }

    /* ===== CRITICAL: Icon sizing to prevent Layout Shift ===== */
    /* Icon elements: reserve exact size so no layout shift even while font loads.
           font-display:swap in the @font-face makes fallback text visible briefly then swaps to icon font
           These dimension rules ensure stable layout. */
    .material-icons,
    .material-icons-round,
    .material-symbols-outlined {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1em;
      height: 1em;
      overflow: hidden;
      vertical-align: middle;
      font-size: inherit;
      line-height: 1;
      contain: layout paint;
      font-feature-settings: 'liga';
      text-rendering: optimizeLegibility;
    }

    /* === Icon Button Containers === */
    /* All icon buttons must have fixed dimensions to prevent shift */
    [class*="icon-btn"],
    [class*="icon-"],
    .icon-row>button,
    .icon-wrapper,
    [title*="Profile"],
    [title*="Search"],
    [title*="Likes"],
    [title*="Messages"],
    [title*="Achievements"],
    [title*="History"],
    [title*="Award"],
    [title*="Trophy"],
    [title*="Heart"],
    [title*="Chat"] {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      min-height: 42px;
      width: 42px;
      height: 42px;
      flex-shrink: 0;
      contain: layout paint style;
      font-size: 0;
    }

    /* Ensure icon elements within buttons display properly */
    [class*="icon-btn"] i,
    [class*="icon-btn"] span,
    [class*="icon-"] i,
    [class*="icon-"] span {
      font-size: 1.125rem;
    }

    /* === Text elements: lock dimensions === */
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      margin-top: 0;
      margin-bottom: 0.5em;
    }

    /* === Prevent FOUT (Flash Of Unstyled Text) === */
    @supports (font-display: swap) {
      body {
        font-display: swap;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
