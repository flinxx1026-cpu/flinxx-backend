    <style>
        body {
            min-height: max(884px, 100dvh);
            margin: 0;
            padding: 0;
            background: #000;
        }

        /* ===== CRITICAL: Icon sizing to prevent Layout Shift ===== */
        /* Icon elements: reserve exact size so no layout shift even while font loads.
           font-display:swap in the @font-face makes fallback text visible briefly then swaps to icon font
           These dimension rules ensure stable layout. */
        .material-icons,
        .material-icons-round,
        .material-symbols-outlined {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1em;
            height: 1em;
            overflow: hidden;
            vertical-align: middle;
            font-size: inherit;
            line-height: 1;
            contain: layout paint;
            font-feature-settings: 'liga';
            text-rendering: optimizeLegibility;
            /* Hide fallback text immediately until icon font loads */
            color: transparent;
            text-indent: -9999px;
        }
        
        /* Restore text color once Material Icons font is loaded */
        @supports (font-variation-settings: normal) {
            .material-icons,
            .material-icons-round,
            .material-symbols-outlined {
                color: inherit;
                text-indent: 0;
            }
        }

        /* === Icon Button Containers === */
        /* All icon buttons must have fixed dimensions to prevent shift */
        [class*="icon-btn"],
        [class*="icon-"],
        .icon-row > button,
        .icon-wrapper,
        [title*="Profile"],
        [title*="Search"],
        [title*="Likes"],
        [title*="Messages"],
        [title*="Achievements"],
        [title*="History"],
        [title*="Award"],

        [title*="Heart"],
        [title*="Chat"] {

            align-items: center;
            justify-content: center;
            min-width: 42px;
            min-height: 42px;
            width: 42px;
            height: 42px;
            flex-shrink: 0;
            contain: layout paint style;
            font-size: 0;
        }
        
        /* Ensure icon elements within buttons display properly */
        [class*="icon-btn"] i,
        [class*="icon-btn"] span,
        [class*="icon-"] i,
        [class*="icon-"] span {
            font-size: 1.125rem;
        }

        /* === Text elements: lock dimensions === */
        h1, h2, h3, h4, h5, h6 {
            margin-top: 0;
            margin-bottom: 0.5em;
        }

        /* === Prevent FOUT (Flash Of Unstyled Text) === */
        @supports (font-display: swap) {
            body {
                font-display: swap;
            }
        }
    </style>
